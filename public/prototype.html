<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LABELX — Content Tool (Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Wix+Madefor+Display:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#000;--panel:#0b0b0c;--panel2:#141416;--line:#26262a;--txt:#f4f4f5;--mut:#8a8a90;--hair:#1c1c1f;--warn:#e6b450;--danger:#ff6b6b;--ok:#7fd49a}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;-webkit-font-smoothing:antialiased}
  h1,h2,h4,.brand{font-family:'Wix Madefor Display','Inter',sans-serif}
  a{color:var(--txt)}
  header{display:flex;align-items:center;gap:16px;padding:16px 26px;border-bottom:1px solid var(--hair);background:#000;position:sticky;top:0;z-index:20}
  .brand{font-weight:800;letter-spacing:2px;font-size:17px}
  .brand .x{display:inline-block;margin-right:8px}
  .role-tag{font-size:11px;border:1px solid var(--line);padding:3px 9px;border-radius:20px;color:var(--mut);letter-spacing:.5px}
  .spacer{flex:1}
  nav button{background:none;border:none;color:var(--mut);padding:8px 12px;cursor:pointer;border-radius:6px;font-size:13px}
  nav button.active{color:var(--txt)}
  .wrap{max-width:1140px;margin:0 auto;padding:26px 24px 70px}
  .eph{font-size:12px;color:var(--mut);border:1px solid var(--hair);border-radius:8px;padding:9px 13px;margin-bottom:18px;display:flex;gap:8px;align-items:center}
  .steps{display:flex;margin-bottom:26px;border:1px solid var(--hair);border-radius:10px;overflow:hidden}
  .step{flex:1;min-width:96px;padding:11px 14px;font-size:11.5px;color:var(--mut);border-right:1px solid var(--hair)}
  .step:last-child{border-right:none}
  .step b{display:block;color:var(--mut);font-size:10px;letter-spacing:1px;margin-bottom:3px}
  .step.on{background:#fff;color:#000}.step.on b{color:#000}
  .step.done{color:var(--txt)}.step.done b{color:var(--txt)}
  .card{background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:20px;margin-bottom:16px}
  h2{margin:0;font-size:22px;font-weight:700;letter-spacing:-.2px}
  .head{margin-bottom:18px}
  .sub{color:var(--mut);font-size:13px;margin-top:5px}
  .btn{background:#fff;color:#000;border:none;padding:10px 18px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px}
  .btn:hover{opacity:.88}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  .btn.ghost:hover{border-color:#444}
  .btn.sm{padding:7px 13px;font-size:12px}
  .btn.mini{padding:6px 11px;font-size:12px}
  .btn[disabled]{opacity:.35;cursor:default}
  .row{display:flex;gap:16px;flex-wrap:wrap}
  .col{flex:1;min-width:270px}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
  .tab{background:transparent;border:1px solid var(--line);color:var(--mut);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:12.5px;font-family:inherit}
  .tab.on{background:#fff;color:#000;border-color:#fff;font-weight:600}
  .list{padding:6px}
  .article{display:flex;gap:14px;align-items:center;padding:13px 14px;border-bottom:1px solid var(--hair);cursor:pointer}
  .article:last-child{border-bottom:none}
  .article:hover{background:var(--panel2)}
  .num{width:30px;text-align:center;color:var(--mut);font-size:13px;font-variant-numeric:tabular-nums;flex-shrink:0}
  .atitle{font-size:14.5px;line-height:1.35}
  .a-meta{font-size:12px;color:var(--mut);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .arrow{color:var(--mut);font-size:16px;opacity:0}
  .article:hover .arrow{opacity:1}
  .chip{border:1px solid var(--line);padding:2px 9px;border-radius:20px;font-size:11px;color:var(--mut)}
  .flag{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
  .f-warn{border:1px solid rgba(230,180,80,.4);color:var(--warn)}
  .f-danger{border:1px solid rgba(255,107,107,.4);color:var(--danger)}
  .f-ok{border:1px solid rgba(120,200,140,.4);color:var(--ok)}
  .note{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--mut);margin:14px 0;line-height:1.5}
  label{display:block;font-size:12px;color:var(--mut);margin:14px 0 6px}
  input,textarea,select{width:100%;background:#000;border:1px solid var(--line);border-radius:9px;color:var(--txt);padding:11px 13px;font-size:13.5px;font-family:inherit}
  textarea{resize:vertical;min-height:96px;line-height:1.55}
  input:focus,textarea:focus,select:focus{outline:none;border-color:#555}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--line);border-radius:22px;cursor:pointer;margin:0 7px 8px 0;font-size:12.5px;background:transparent}
  .pill.sel{border-color:#fff;background:#fff;color:#000}
  .pill .dot{width:8px;height:8px;border-radius:50%}
  .canvas-wrap{display:flex;justify-content:center;background:#000;border-radius:12px;padding:14px;border:1px solid var(--hair)}
  canvas{max-width:100%;border-radius:4px;background:#161616}
  .gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-top:6px}
  .thumb{aspect-ratio:1;border-radius:8px;border:2px solid transparent;cursor:pointer;background-size:cover;position:relative}
  .thumb.sel{border-color:#fff}
  .thumb .ref{position:absolute;bottom:3px;left:3px;font-size:9px;background:rgba(230,180,80,.9);color:#111;padding:1px 5px;border-radius:5px}
  .muted{color:var(--mut);font-size:12px}
  .toolbar{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}
  .navrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px;justify-content:center}
  .tbtn{border:1px solid var(--line);background:transparent;color:var(--txt);border-radius:7px;padding:5px 11px;cursor:pointer;font-size:12px;font-weight:600}
  .tbtn.on{background:#fff;color:#000;border-color:#fff}
  .resgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:8px}
  .res{aspect-ratio:1;border-radius:7px;border:2px solid transparent;cursor:pointer;position:relative}
  .res.sel{border-color:#fff}
  .res .rb{position:absolute;bottom:3px;left:3px;font-size:8.5px;background:rgba(230,180,80,.9);color:#111;padding:1px 4px;border-radius:4px}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px;border-bottom:1px solid var(--hair)}
  th{color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .yes{color:var(--ok)}.no{color:var(--danger)}
  .login{max-width:380px;margin:11vh auto;text-align:center}
  .login .card{padding:36px 30px}
  .swatch{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);cursor:pointer;display:inline-block;margin:0 7px 7px 0}
  .swatch.sel{border-color:#fff}
  .hidden{display:none}
  .tagline{color:var(--mut);font-size:12px;letter-spacing:1px;margin:6px 0 20px}
  /* sub-box grid */
  .subgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  @media(max-width:580px){.subgrid{grid-template-columns:1fr}}
  .subbox{border:1px solid var(--line);border-radius:12px;padding:14px;background:var(--panel);position:relative;display:flex;flex-direction:column}
  .subbox.locked{border-color:#3a3a3c;background:#0e0e10}
  .subbox .x{position:absolute;top:9px;right:11px;cursor:pointer;color:var(--mut);font-size:14px}
  .subbox .x:hover{color:#fff}
  .subbox h4{margin:0 18px 4px 0;font-size:13px;display:flex;align-items:center;gap:7px}
  .fieldlab{font-size:11px;color:var(--mut);margin:12px 0 5px;display:flex;justify-content:space-between;align-items:center}
  .retry{cursor:pointer;color:var(--mut);font-size:12px;border:1px solid var(--line);border-radius:6px;padding:1px 7px}
  .retry:hover{color:#fff;border-color:#555}
  .mini{font-size:12.5px;padding:8px 10px}
  textarea.mini{min-height:90px}
  .tagrow{display:flex;flex-wrap:wrap;gap:4px;align-items:center;margin-bottom:6px}
  .ftag{font-size:10.5px;color:var(--mut);border:1px solid var(--hair);border-radius:20px;padding:2px 8px;opacity:.5}
  .ck{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--txt);margin:12px 0 5px;cursor:pointer}
  .ck input{width:auto}
  /* one-row scrollable channel picker */
  .chanrow{display:flex;align-items:center;gap:12px;margin-top:12px}
  .selall{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut);white-space:nowrap;cursor:pointer;flex:0 0 auto}
  .selall input{width:auto}
  .chanscroll{display:flex;gap:8px;overflow-x:auto;flex:1;padding-bottom:4px}
  .chanscroll::-webkit-scrollbar{height:6px}
  .chanscroll::-webkit-scrollbar-thumb{background:#333;border-radius:6px}
  .chanscroll .pill{flex:0 0 auto;margin:0}
  /* caption auto-grow, no scroll */
  textarea.autogrow{field-sizing:content;min-height:74px;overflow:hidden}
  /* hashtag single box: faded pre-ruled + editable */
  .taginput{display:flex;flex-wrap:wrap;align-items:center;gap:6px;background:#000;border:1px solid var(--line);border-radius:9px;padding:9px 11px}
  .taginput .faded{color:var(--mut);opacity:.55;font-size:12.5px;white-space:nowrap}
  .taginput input{border:none;background:transparent;padding:0;flex:1;min-width:130px;font-size:12.5px;color:var(--txt)}
  .taginput input:focus{outline:none}
  .ctarow{display:flex;align-items:center;gap:9px;margin-top:6px}
  .ctarow input[type=checkbox]{width:auto;flex:0 0 auto}
  .subactions{display:flex;gap:7px;margin-top:12px;align-items:center}
  .pubstate{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--mut)}
  .spin{display:inline-block;width:12px;height:12px;border:2px solid #555;border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .done-fade{opacity:.4;pointer-events:none}
  .vstack>.card:last-child{margin-bottom:0}
  .locktag{font-size:11px;color:var(--ok);border:1px solid rgba(120,200,140,.4);border-radius:20px;padding:2px 9px}
  /* carousel */
  .carhead{display:flex;align-items:center;justify-content:space-between;margin:4px 0 10px}
  .carcount{font-size:12px;color:var(--mut)}
  .carnav{display:flex;gap:8px}
  .cbtn{border:1px solid var(--line);background:transparent;color:var(--txt);border-radius:8px;padding:6px 13px;cursor:pointer;font-size:14px}
  .cbtn:hover{border-color:#555}
  .cbtn[disabled]{opacity:.3;cursor:default}
  .carstage{max-width:640px;margin:0 auto}
  .thumbstrip{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;justify-content:center}
  .cthumb{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12.5px;background:var(--panel)}
  .cthumb:hover{border-color:#555}
  .cthumb.on{border-color:#fff;background:var(--panel2)}
  .cthumb.done{opacity:.4}
  .cthumb .st{font-size:11px;color:var(--mut)}
  /* realistic post preview */
  .post{width:340px;max-width:100%;margin:0 auto;background:#fff;color:#1c1e21;border:1px solid #d8dadf;border-radius:10px;overflow:hidden;font-size:13px;font-family:'Inter',Helvetica,Arial,sans-serif}
  .post-h{display:flex;align-items:center;gap:9px;padding:11px 12px}
  .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:15px;flex-shrink:0}
  .post-h .nm{font-weight:600;font-size:13.5px;color:#050505}
  .post-h .tm{color:#65676b;font-size:11.5px}
  .post-h .more{margin-left:auto;color:#65676b;font-size:16px}
  .post-cap{padding:0 12px 10px;line-height:1.45;white-space:pre-wrap;word-break:break-word;color:#050505}
  .post-img{width:100%;display:block;background:#000;line-height:0}
  .post-img canvas{width:100%;display:block}
  .seemore{color:#65676b;cursor:pointer;font-weight:600}
  .seemore:hover{text-decoration:underline}
  .ig-actions{display:flex;gap:15px;padding:9px 12px 5px;font-size:20px;color:#262626}
  .ig-actions .right{margin-left:auto}
  .ig-likes{padding:0 12px;font-weight:600;font-size:13px;color:#262626}
  .ig-cap{padding:5px 12px 3px;line-height:1.45;white-space:pre-wrap;word-break:break-word;color:#262626}
  .ig-cmt{padding:2px 12px 12px;color:#8e8e8e;font-size:12px}
  .fb-counts{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;color:#65676b;font-size:12px;border-bottom:1px solid #e4e6eb}
  .fb-actions{display:flex;padding:3px 6px}
  .fb-actions div{flex:1;text-align:center;padding:8px;color:#65676b;font-size:13px;font-weight:600}
  .pf-tab{display:flex;gap:6px;margin-bottom:10px}
</style>
</head>
<body>

<div id="login" class="login">
  <div class="card">
    <div class="brand" style="font-size:24px"><span class="x">✕</span>LABELX</div>
    <div class="tagline">BORN TO CREATE · BUILT TO LEAD</div>
    <label style="text-align:left">Work email</label>
    <input id="email" value="user@labelx.vn">
    <div style="height:14px"></div>
    <button class="btn" style="width:100%" onclick="login('user')">Sign in — User</button>
    <div style="height:9px"></div>
    <button class="btn ghost" style="width:100%" onclick="login('admin')">Sign in — Admin</button>
  </div>
</div>

<div id="app" class="hidden">
<header>
  <div class="brand"><span class="x">✕</span>LABELX</div>
  <span class="role-tag" id="roleTag">USER</span>
  <div class="spacer"></div>
  <nav id="nav"></nav>
  <button class="btn ghost sm" onclick="logout()">Sign out</button>
</header>
<div class="wrap">
  <div id="workflow">
    <div class="steps" id="stepbar"></div>
    <div id="stepContent"></div>
  </div>
  <div id="admin" class="hidden">
    <div class="head"><h2>Admin</h2></div>
    <div class="card"><div class="row">
      <div class="col"><h2 style="font-size:15px;margin-bottom:12px">Channels (5 FB · 3 IG)</h2><div id="adminChannels"></div></div>
      <div class="col"><h2 style="font-size:15px;margin-bottom:12px">Configuration</h2><div id="adminSections"></div></div>
    </div></div>
    <div class="card"><h2 style="font-size:15px;margin-bottom:12px">Permissions</h2><div id="permMatrix"></div></div>
  </div>
</div>
</div>

<script>
/* ---------- Kênh kết nối ---------- */
const CTA={editorial:'👉 Theo dõi LabelX để cập nhật thông tin mới nhất',genz:'👉 Follow ngay để không bỏ lỡ tin hot nha!',news:'👉 Theo dõi để xem tin mới mỗi ngày',fan:'💜 Theo dõi để cùng đồng hành với nghệ sĩ nhé',brand:'Theo dõi LabelX để nhận thông tin chính thức.'};
const CHANNELS=[
  {id:'fb1',name:'LabelX Music',platform:'FB',tone:'Premium editorial',age:'25-40',color:'#ffffff',allowColor:false,tags:['#LabelXMusic','#Vpop','#LabelX'],cta:CTA.editorial},
  {id:'fb2',name:'Vpop Daily',platform:'FB',tone:'Gen Z casual',age:'16-24',color:'#22c55e',allowColor:true,tags:['#VpopDaily','#Vpop','#LabelX'],cta:CTA.genz},
  {id:'fb3',name:'Showbiz Now',platform:'FB',tone:'Punchy news',age:'18-30',color:'#f59e0b',allowColor:true,tags:['#ShowbizNow','#Showbiz','#LabelX'],cta:CTA.news},
  {id:'fb4',name:'Artist Spotlight',platform:'FB',tone:'Warm fan voice',age:'16-28',color:'#ef4444',allowColor:false,tags:['#ArtistSpotlight','#LabelX','#Music'],cta:CTA.fan},
  {id:'fb5',name:'LabelX Official',platform:'FB',tone:'Formal brand',age:'20-45',color:'#38bdf8',allowColor:false,tags:['#LabelXOfficial','#LabelX','#Music'],cta:CTA.brand},
  {id:'ig1',name:'@labelx',platform:'IG',tone:'Premium editorial',age:'18-30',color:'#ffffff',allowColor:false,tags:['#labelx','#Vpop','#Music'],cta:CTA.editorial},
  {id:'ig2',name:'@vpop.daily',platform:'IG',tone:'Gen Z casual',age:'15-22',color:'#34d399',allowColor:true,tags:['#vpopdaily','#Vpop','#LabelX'],cta:CTA.genz},
  {id:'ig3',name:'@showbiz.now',platform:'IG',tone:'Punchy news',age:'18-30',color:'#fbbf24',allowColor:true,tags:['#showbiznow','#Showbiz','#LabelX'],cta:CTA.news},
];
const TONEMOJI={'Gen Z casual':' 🔥','Warm fan voice':' 💜'};

/* ---------- Dữ liệu tin (~50) ---------- */
const CATS=[{key:'all',name:'All'},{key:'domestic',name:'Domestic'},{key:'intl',name:'International'},{key:'concert',name:'Concert / Liveshow'},{key:'mv',name:'MV'},{key:'album',name:'Album'},{key:'chart',name:'Charts'},{key:'event',name:'Events'}];
const CATNAME={domestic:'Domestic',intl:'Intl',concert:'Concert',mv:'MV',album:'Album',chart:'Charts',event:'Event'};
const VN=['Sơn Tùng M-TP','Mỹ Tâm','Hà Anh Tuấn','Đen Vâu','Hoàng Thùy Linh','Vũ.','HIEUTHUHAI','tlinh','MONO','Trúc Nhân','Erik','AMEE','Văn Mai Hương','Đông Nhi','Wren Evans','Mỹ Anh','Phương Ly','Noo Phước Thịnh'];
const INTL=['BLACKPINK','BTS','Taylor Swift','IU','NewJeans','Bruno Mars','Coldplay','aespa','SEVENTEEN','Olivia Rodrigo','LE SSERAFIM','G-Dragon'];
const SRC=['Kenh14','Ngoisao','Znews','VnExpress Giải Trí','Thanh Niên Giải Trí','Tuổi Trẻ Giải Trí'];
const CITY=['Hà Nội','TP.HCM','Đà Nẵng'];
const TPL={
  domestic:(a)=>[`${a} hé lộ dự án âm nhạc hoàn toàn mới`,`${a} chia sẻ về hành trình làm nghề sau nhiều năm`,`${a} gây sốt với màn kết hợp bất ngờ`,`${a} tiết lộ kế hoạch trở lại đường đua âm nhạc`],
  intl:(a)=>[`${a} công bố lịch trình tour diễn châu Á`,`${a} phá kỷ lục streaming chỉ sau vài giờ`,`${a} tung teaser cho lần comeback được mong chờ`,`${a} gây bão mạng với sản phẩm mới`],
  concert:(a,c)=>[`${a} chốt đêm nhạc tại ${c}`,`Liveshow của ${a} cháy vé sau ít phút mở bán`,`${a} công bố line-up cho đêm nhạc cuối năm tại ${c}`,`${a} bổ sung suất diễn vì nhu cầu tăng cao`],
  mv:(a)=>[`${a} ra mắt MV mới sau thời gian ấp ủ`,`MV mới của ${a} nhanh chóng lọt top trending`,`${a} mạnh tay đầu tư hình ảnh cho MV comeback`,`${a} hé lộ hậu trường MV được mong đợi`],
  album:(a)=>[`${a} phát hành album phòng thu mới`,`${a} công bố tracklist album sắp ra mắt`,`Album mới của ${a} nhận phản hồi tích cực`,`${a} kể câu chuyện đằng sau album mới`],
  chart:(a)=>[`${a} dẫn đầu bảng xếp hạng âm nhạc tuần này`,`${a} trở lại top BXH sau thời gian vắng bóng`,`Ca khúc của ${a} lập thành tích mới trên BXH`,`${a} giữ vững vị trí cao trên các BXH lớn`],
  event:(a)=>[`${a} góp mặt tại lễ trao giải âm nhạc lớn`,`${a} được đề cử ở nhiều hạng mục quan trọng`,`${a} trình diễn ấn tượng tại sự kiện âm nhạc`,`Sự kiện âm nhạc quy tụ dàn nghệ sĩ đình đám`],
};
const FACTS={
  domestic:['Thông tin được chia sẻ từ phía nghệ sĩ','Dự án đang trong giai đoạn chuẩn bị'],
  intl:['Công bố trên kênh chính thức','Sản phẩm hướng đến thị trường quốc tế'],
  concert:['Đã công bố thời gian & địa điểm','Vé dự kiến mở bán trong thời gian tới'],
  mv:['MV đã chính thức phát hành','Nhận nhiều phản hồi từ khán giả'],
  album:['Album gồm nhiều ca khúc mới','Phát hành trên các nền tảng nhạc số'],
  chart:['Số liệu theo bảng xếp hạng','Thành tích được ghi nhận trong tuần'],
  event:['Sự kiện có nhiều nghệ sĩ tham gia','Thông tin từ phía ban tổ chức'],
};
const FLAG_LABEL={ok:['No major risk','f-ok'],rumor:['Rumor','f-danger'],unverified:['Unverified','f-danger'],relationship:['Relationship','f-warn'],health:['Health','f-warn'],sensitive:['Sensitive','f-warn']};
const ARTICLES=(function(){
  const plan=[['domestic',10],['intl',8],['concert',8],['mv',8],['album',6],['chart',6],['event',4]];let out=[],id=0;
  plan.forEach(([cat,n])=>{for(let i=0;i<n;i++){
    const pool=cat==='intl'?INTL:VN;const artist=pool[(id*7+i)%pool.length];const city=CITY[id%3];
    const tarr=TPL[cat](artist,city);const title=tarr[i%tarr.length];
    let flags=['ok'];if(id%11===4)flags=['rumor','unverified'];else if(id%13===6)flags=['health','sensitive'];else if(id%17===10)flags=['relationship','unverified'];
    out.push({id:id,cat:cat,catName:CATNAME[cat],title:title,artist:artist,source:SRC[id%SRC.length],time:((id%23)+1)+'h ago',
      summary:`${title}. ${FACTS[cat][0]}; ${FACTS[cat][1].toLowerCase()}. Thông tin được ${SRC[id%SRC.length]} đăng tải.`,
      facts:FACTS[cat].slice(),flags:flags});id++;}});

})();

/* ---------- Sinh nội dung ---------- */
function clip(t,n){return t.split(' ').slice(0,n).join(' ');}
function titleVariants(tone,a){
  const ar=a.artist;
  const byCat={domestic:[`${ar} và dự án âm nhạc mới`,`${ar} chuẩn bị trở lại`],intl:[`${ar} và màn comeback mới`,`${ar} gây chú ý toàn cầu`],concert:[`Đêm nhạc của ${ar}`,`${ar} và liveshow được mong chờ`],mv:[`MV mới của ${ar}`,`${ar} tung MV comeback`],album:[`Album mới của ${ar}`,`${ar} ra mắt album`],chart:[`${ar} dẫn đầu bảng xếp hạng`,`${ar} lập thành tích mới`],event:[`${ar} tại sự kiện âm nhạc`,`${ar} góp mặt lễ trao giải`]};
  const base=[clip(a.title,9),...(byCat[a.cat]||[ar])].slice(0,3);
  const emo=TONEMOJI[tone]||'';return base.map(t=>t+emo);
}
function captionVariants(tone,a){
  const body=a.facts.map(s=>/[.!?]$/.test(s)?s:s+'.').join(' ');const src=`Nguồn: ${a.source}.`;
  const V={
   'Premium editorial':[`${a.title}.\n\n${body} ${src}`,`${body} Đây là thông tin liên quan đến ${a.artist}. ${src}`],
   'Gen Z casual':[`${a.artist} có tin mới nè 👀🔥\n\n${body} ${src}`,`Update nhẹ về ${a.artist} nha 🔥\n\n${body} ${src}`],
   'Punchy news':[`${a.title}. ${body} Theo ${a.source}.`,`Tin nhanh: ${body} ${src}`],
   'Warm fan voice':[`Tin mới về ${a.artist} 💜\n\n${body} ${src}`,`Gửi fan của ${a.artist} 💜\n\n${body} ${src}`],
   'Formal brand':[`Thông tin: ${a.title}.\n\n${body} ${src}`,`Thông báo chính thức: ${body} Nguồn tham khảo: ${a.source}.`],
  };
  return V[tone]||V['Punchy news'];
}
function autoTagSets(a){
  const ar='#'+a.artist.replace(/[\s\.\-’'·]/g,'');
  const cat={domestic:'#Vpop',intl:'#Kpop',concert:'#Liveshow',mv:'#MVmoi',album:'#Album',chart:'#BXH',event:'#SuKienAmNhac'}[a.cat]||'#Music';
  return [[ar,cat,'#trending'],[ar,'#amnhac','#showbiz'],[ar,cat,'#viral']];
}
function makePost(id){
  const ch=CHANNELS.find(c=>c.id===id),a=ST.article;

    lockedTags:ch.tags.slice(),autoTags:autoTagSets(a)[0].slice(),includeCTA:true,cta:ch.cta,
    locked:false,frame:'premade',frameColor:'#000000',logo:true,imgLocked:false,pubStatus:'idle',capOpen:false,
    photo:{kind:'none'},srcMode:'none',query:'',imgTitle:'',titleSize:'m',titleColor:'#ffffff'};
}

const PALETTE=['#3b4252','#4a4458','#264653','#2a3d34','#4a342e','#37343f','#2b3a55','#503a3a','#26413a','#45402b','#3a2b45','#2b454a','#4a2b3a','#34343f','#2e2e38','#42332b'];
function seedColors(seed,n){const off=(seed||'').length+(seed?seed.charCodeAt(0):0);return Array.from({length:n},(_,i)=>PALETTE[(i+off)%PALETTE.length]);}

function sourcePicker(id){
  const p=P(id);
  if(p.srcMode==='web'){
    const cols=seedColors(p.query||'vpop',16);
    const tiles=cols.map((c,i)=>`<div class="res ${isSelColor(p,c)?'sel':''}" style="background:linear-gradient(135deg,${c},#0a0a0b)" onclick="selPhoto('${id}','web','${c}')"><span class="rb">Google</span></div>`).join('');
    return `<div style="margin-top:8px"><div style="display:flex;gap:7px"><input class="mini" placeholder="Search photos…" value="${esc(p.query)}" oninput="P('${id}').query=this.value" onkeydown="if(event.key==='Enter')goStep(4)"><button class="btn mini" onclick="goStep(4)">Search</button></div>
      <div class="muted" style="margin-top:6px">Reference only</div>
      <div class="resgrid">${tiles}</div></div>`;
  }
  if(p.srcMode==='article'){
    const cols=seedColors((ST.article?ST.article.artist:'a'),6);
    const tiles=cols.map((c,i)=>`<div class="res ${isSelColor(p,c)?'sel':''}" style="background:linear-gradient(135deg,${c},#0a0a0b)" onclick="selPhoto('${id}','article','${c}')"><span class="rb">Ref</span></div>`).join('');
    return `<div style="margin-top:8px"><div class="muted">Reference only</div><div class="resgrid" style="grid-template-columns:repeat(3,1fr)">${tiles}</div></div>`;
  }
  if(p.photo&&p.photo.kind==='upload')return `<div class="muted" style="margin-top:8px">✓ Uploaded</div>`;
  return `<div class="muted" style="margin-top:8px">Max 5 MB</div>`;
}
function setSrc(id,mode){P(id).srcMode=mode;goStep(4);}
function selPhoto(id,kind,color){P(id).photo={kind:kind,color:color,label:kind==='web'?'web photo':'article photo'};drawCanvas('cv4_'+id,P(id),CHANNELS.find(c=>c.id===id));goStep(4);}
function onUpload(id,input){const f=input.files&&input.files[0];if(!f)return;
  if(f.size>5*1024*1024){toast('Image too large — max 5 MB');input.value='';return;}
  const img=new Image();img.onload=()=>{P(id).photo={kind:'upload',img:img};P(id).srcMode='none';drawCanvas('cv4_'+id,P(id),CHANNELS.find(c=>c.id===id));goStep(4);};
  img.onerror=()=>toast('Couldn’t read image');
  const fr=new FileReader();fr.onload=e=>{img.src=e.target.result;};fr.readAsDataURL(f);input.value='';}
function setTSize(id,s){P(id).titleSize=s;goStep(4);}
function setTColor(id,c){P(id).titleColor=c;goStep(4);}
function setFrame(id,f){P(id).frame=f;goStep(4);}
function setColor(id,c){P(id).frameColor=c;goStep(4);}
function lockImg(id){P(id).imgLocked=true;ST.carIdx=nextUnlocked(x=>P(x).imgLocked);goStep(4);}
function editImg(id){P(id).imgLocked=false;ST.carIdx=selOrder().indexOf(id);goStep(4);}
function back5to4(n){ST.selected.forEach(id=>{if(n===3)P(id).locked=false;});ST.carIdx=0;goStep(n);}

/* ---------- Vẽ canvas ---------- */
function drawCanvas(cid,p,ch){
  const cv=document.getElementById(cid);if(!cv||!p)return;const x=cv.getContext('2d');const W=cv.width,H=cv.height;
  const ph=p.photo||{kind:'none'};
  if(ph.kind==='upload'&&ph.img){const iw=ph.img.width,ih=ph.img.height,s=Math.max(W/iw,H/ih),dw=iw*s,dh=ih*s;x.drawImage(ph.img,(W-dw)/2,(H-dh)/2,dw,dh);}
  else{const c=ph.color||IMGS[2].c;const g=x.createLinearGradient(0,0,W,H);g.addColorStop(0,c);g.addColorStop(1,'#08080a');x.fillStyle=g;x.fillRect(0,0,W,H);
    x.fillStyle='rgba(255,255,255,.05)';x.font='12px Inter,sans-serif';x.textAlign='left';x.fillText('[ '+(ph.kind==='none'?'reference photo':ph.label||'reference photo')+' ]',W/2-55,H/2);}
  let fc=p.frame==='black'?'#000':p.frame==='premade'?ch.color:p.frameColor;const b=20;
  x.fillStyle=fc;x.fillRect(0,0,W,b);x.fillRect(0,H-b*3,W,b*3);x.fillRect(0,0,b,H);x.fillRect(W-b,0,b,H);
  const gg=x.createLinearGradient(0,H-180,0,H);gg.addColorStop(0,'rgba(0,0,0,0)');gg.addColorStop(1,'rgba(0,0,0,.62)');x.fillStyle=gg;x.fillRect(0,H-180,W,180);
  const title=(p.imgTitle&&p.imgTitle.trim())?p.imgTitle:(p.title||'Title');
  const size={s:21,m:27,l:33}[p.titleSize||'m'];const cpl=size<=21?27:size>=33?18:22;
  x.font='700 '+size+'px "Wix Madefor Display",Inter,sans-serif';x.textAlign='center';
  const words=title.split(' ');let lines=[],cur='';words.forEach(w=>{if((cur+' '+w).length>cpl){lines.push(cur);cur=w;}else cur=(cur?cur+' ':'')+w;});if(cur)lines.push(cur);lines=lines.slice(0,3);
  const lh=size+7,tc=p.titleColor||'#ffffff',sc=tc==='#000000'?'rgba(255,255,255,.85)':'rgba(0,0,0,.8)';
  let yy=H-b*3-(lines.length-1)*lh-16;lines.forEach(ln=>{x.lineWidth=5;x.strokeStyle=sc;x.strokeText(ln,W/2,yy);x.fillStyle=tc;x.fillText(ln,W/2,yy);yy+=lh;});
  x.textAlign='left';
  if(p.logo){x.fillStyle='rgba(255,255,255,.95)';x.fillRect(W-b-90,b+12,78,24);x.fillStyle='#000';x.font='800 12px "Wix Madefor Display",sans-serif';x.fillText('✕LABELX',W-b-84,b+29);}
  x.fillStyle='rgba(255,255,255,.65)';x.font='10px Inter,sans-serif';x.fillText('Source: '+(ST.article?ST.article.source:''),b+6,H-b-6);
}

/* ---------- Bước 5 ---------- */
function fullText(id){const p=P(id);let s=p.caption+'\n\n'+[...p.lockedTags,...p.autoTags].join(' ');if(p.includeCTA&&p.cta)s+='\n\n'+p.cta;return s;}
function step5(){
  const boxes=selOrder().map(id=>subbox5(id)).join('');
  return `<div class="head"><h2>Publish</h2></div>
   <div class="subgrid">${boxes}</div>
   <div class="navrow"><button class="btn ghost sm" onclick="back5to4(4)">← Back</button>
     <button class="btn" onclick="finishTask()">✓ Done — clear session</button></div>`;
}
function subbox5(id){
  const ch=CHANNELS.find(c=>c.id===id),p=P(id);
  const dot=`<span class="dot" style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${ch.color};border:1px solid #777"></span>`;
  return `<div class="subbox" id="s5_${id}">
    <h4>${dot}${ch.name}<span class="chip">${ch.tone}</span></h4>
    <div class="canvas-wrap" style="padding:8px;margin:8px 0;cursor:pointer" onclick="saveOne('${id}')" title="Tap to save image"><canvas id="cv5_${id}" width="540" height="540" style="width:100%"></canvas></div>
    <div class="fieldlab">Title <span class="retry" onclick="copyOne('${id}','title')" title="Copy title">⧉</span></div>
    <div style="font-weight:600;font-size:12.5px">${p.title}</div>
    <div class="fieldlab">Caption + hashtags + CTA <span class="retry" onclick="copyOne('${id}','full')" title="Copy all">⧉</span></div>
    <div class="muted" style="white-space:pre-wrap;font-size:12px;line-height:1.55">${fullText(id)}</div>
    <div class="subactions" style="justify-content:center"><button class="btn mini" onclick="pushOne('${id}')">⤴ Publish to ${ch.platform}</button><span class="pubstate" id="ps_${id}"></span></div></div>`;
}
function saveOne(id){const cv=document.getElementById('cv5_'+id);const a=document.createElement('a');a.download='labelx_'+id+'.png';a.href=cv.toDataURL();a.click();toast('Image saved');}
function copyOne(id,kind){copyTxt(kind==='title'?P(id).title:fullText(id));}
function copyTxt(t){navigator.clipboard&&navigator.clipboard.writeText(t);toast('Copied');}
function pushOne(id){const p=P(id);if(p.pubStatus==='loading'||p.pubStatus==='success')return;p.pubStatus='loading';updatePS(id);
  setTimeout(()=>{p.pubStatus='success';updatePS(id);const el=document.getElementById('s5_'+id);if(el)el.classList.add('done-fade');},1300);}
function updatePS(id){const el=document.getElementById('ps_'+id);if(!el)return;const s=P(id).pubStatus;
  el.innerHTML=s==='loading'?'<span class="spin"></span> Publishing…':s==='success'?'<span style="color:var(--ok)">✓ Published</span>':s==='error'?'<span style="color:var(--danger)">⚠️ Error — retry</span>':'';}
function finishTask(){if(confirm('Finish and clear this session?\\n\\nAll generated content and temporary images will be deleted.')){ST.article=null;ST.selected=[];ST.posts={};toast('Session cleared');goStep(1);}}
function toast(m){const d=document.createElement('div');d.textContent=m;d.style.cssText='position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:11px 20px;border-radius:9px;z-index:99;font-size:13px;font-weight:600';document.body.appendChild(d);setTimeout(()=>d.remove(),1700);}

/* ---------- Quản trị ---------- */
function renderAdmin(){
  document.getElementById('adminChannels').innerHTML=CHANNELS.map(c=>`<div class="article" style="cursor:default"><div class="num"><span class="dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c.color};border:1px solid #777"></span></div><div style="flex:1"><div class="atitle">${c.name} <span class="muted">${c.platform}</span></div><div class="a-meta"><span class="chip">${c.tone}</span><span class="chip">Age ${c.age}</span><span class="chip">${c.allowColor?'color: editable':'color: locked'}</span></div></div></div>`).join('');
  const sections=['Writing style profiles','Frame templates + rules','Logo assets','Font rules','News sources + weights','Safety rules','Users & access'];
  document.getElementById('adminSections').innerHTML=sections.map(s=>`<div class="article" style="cursor:default"><div style="flex:1">${s}</div><span class="chip">CRUD</span></div>`).join('');
  const caps=[['View / create / edit / export','✓','✓'],['Publish (with confirm)','✓','✓'],['Edit channel identity & style','✓','✗'],['Upload official frames / logos','✓','✗'],['Manage sources & safety rules','✓','✗'],['Manage users','✓','✗'],['Store generated content history','✗','✗']];
  document.getElementById('permMatrix').innerHTML=`<table><tr><th>Capability</th><th>Admin</th><th>User</th></tr>${caps.map(r=>`<tr><td>${r[0]}</td><td class="${r[1]==='✓'?'yes':'no'}">${r[1]}</td><td class="${r[2]==='✓'?'yes':'no'}">${r[2]}</td></tr>`).join('')}</table>`;
}
